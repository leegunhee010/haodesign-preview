<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>치맥페 바우처</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;500;600;700;800;900&family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap');

  :root {
    --accent: #f59e0b;
    --accent-deep: #d97706;
    --accent-soft: #fff7e6;
    --green: #16a34a;
    --green-soft: #e8f7ee;
    --red: #dc2626;
    --red-soft: #fdeaea;
    --bg: #f4f5f7;
    --surface: #ffffff;
    --text: #15181d;
    --muted: #6b7280;
    --border: #e6e8ec;
    --font-body: 'Gothic A1', sans-serif;
  }
  body.lang-vi { --font-body: 'Be Vietnam Pro', sans-serif; }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 18px 16px 56px;
    -webkit-tap-highlight-color: transparent;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 440px; margin: 0 auto; }

  /* ===== 헤더 ===== */
  header { position: relative; text-align: center; margin: 4px 0 0; }
  .logo { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; color: var(--text); }
  .logo .em { color: var(--accent-deep); }
  .sub { margin-top: 3px; font-size: 11px; letter-spacing: 3px; color: var(--muted); font-weight: 700; }
  .mode-badge {
    display: inline-block; margin-top: 11px; font-size: 12px; font-weight: 700;
    padding: 5px 14px; border-radius: 999px;
  }
  .mode-badge.check { background: var(--green-soft); color: var(--green); }
  .mode-badge.admin { background: var(--accent-soft); color: var(--accent-deep); }
  .topbtn {
    position: absolute; top: 0; right: 0; background: var(--surface);
    border: 1px solid var(--border); color: var(--text); cursor: pointer;
    border-radius: 10px; padding: 8px 12px; font-size: 12px; font-weight: 700;
  }
  .topbtn:active { background: var(--bg); }
  .lang-mini { display: flex; gap: 6px; justify-content: center; margin-top: 11px; }
  .lang-mini button {
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    border-radius: 999px; padding: 5px 14px; font-size: 12px; font-weight: 700; cursor: pointer;
  }
  .lang-mini button.on { background: var(--text); color: #fff; border-color: var(--text); }

  /* ===== 탭 ===== */
  .tabs { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 5px; margin: 16px 0 14px; }
  .tabs button {
    flex: 1; border: none; background: transparent; color: var(--muted);
    font-family: inherit; font-weight: 700; font-size: 14px; padding: 11px 6px; border-radius: 10px; cursor: pointer;
  }
  .tabs button.on { background: var(--text); color: #fff; }

  /* ===== 통계 ===== */
  .stats { display: flex; gap: 10px; margin-bottom: 14px; }
  .stat { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 8px; text-align: center; }
  .stat .n { font-size: 26px; font-weight: 900; color: var(--text); line-height: 1; }
  .stat.left .n { color: var(--accent-deep); }
  .stat .l { font-size: 11px; color: var(--muted); margin-top: 6px; font-weight: 600; }

  /* ===== 카드 ===== */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 18px; margin-bottom: 14px; }
  .card h2 { font-size: 15px; font-weight: 800; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
  .card h2 .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }

  #reader { border-radius: 14px; overflow: hidden; background: var(--bg); min-height: 60px; }

  /* ===== 버튼 ===== */
  .btn {
    width: 100%; border: none; cursor: pointer; font-family: inherit;
    font-size: 16px; font-weight: 800; padding: 15px; border-radius: 14px;
    background: var(--accent); color: #1a1205; transition: transform .08s, filter .15s;
  }
  .btn:active { transform: scale(0.98); }
  .btn:hover { filter: brightness(0.98); }
  .btn.ghost { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
  .btn + .btn { margin-top: 10px; }
  #scanBtn { margin-top: 12px; padding: 17px; font-size: 17px; }

  .manual { display: flex; gap: 8px; margin-top: 12px; }
  .manual input {
    flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    border-radius: 12px; padding: 13px 14px; font-size: 16px; font-family: inherit;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .manual input:focus { outline: none; border-color: var(--accent); background: var(--surface); }
  .manual button { border: none; background: var(--text); color: #fff; font-weight: 800; padding: 0 18px; border-radius: 12px; cursor: pointer; font-family: inherit; font-size: 15px; }

  /* ===== 결과 배너 ===== */
  .result { border-radius: 18px; padding: 26px 20px; text-align: center; margin-bottom: 14px; display: none; animation: pop .2s ease; }
  @keyframes pop { from { transform: scale(0.96); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .result.ok  { display: block; background: var(--green-soft); border: 1.5px solid var(--green); }
  .result.dup { display: block; background: var(--red-soft); border: 1.5px solid var(--red); }
  .result.bad { display: block; background: #f1f2f4; border: 1.5px solid #cbd0d6; }
  .result .ico { font-size: 52px; line-height: 1; }
  .result .ttl { font-size: 25px; font-weight: 900; margin: 8px 0 4px; }
  .result.ok .ttl { color: var(--green); }
  .result.dup .ttl { color: var(--red); }
  .result .meta { font-size: 13px; color: var(--muted); }
  .result .code { font-family: ui-monospace, monospace; font-size: 15px; letter-spacing: 2px; color: var(--text); margin-top: 8px; font-weight: 700; }

  /* ===== 발급 ===== */
  .gen-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
  .gen-row input { width: 72px; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 11px; font-size: 15px; text-align: center; }
  .gen-row label { font-size: 14px; color: var(--muted); }

  /* ===== QR 카드 목록 ===== */
  .voucher-list { margin-top: 14px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .v { background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 14px; padding: 12px 8px; text-align: center; position: relative; overflow: hidden; }
  .v.used { opacity: 0.75; }
  .v.used canvas, .v.used img { opacity: 0.3; }
  .v.used .badge-used { position: absolute; top: 8px; left: 50%; transform: translateX(-50%) rotate(-6deg); font-weight: 800; color: #fff; background: var(--red); font-size: 11px; padding: 2px 8px; border-radius: 6px; }
  .v .vinfo { font-size: 11px; color: var(--red); font-weight: 700; margin-top: 4px; line-height: 1.3; }
  .v canvas, .v img { width: 84px !important; height: 84px !important; margin: 0 auto; background: #fff; border-radius: 6px; }
  .v .vc { font-family: ui-monospace, monospace; font-size: 11px; margin-top: 6px; font-weight: 700; letter-spacing: 1px; }

  .toolbar { display: flex; gap: 8px; margin-top: 14px; }
  .toolbar .btn { font-size: 14px; padding: 12px; }

  .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 20px 0; }
  .note { font-size: 12px; color: var(--muted); text-align: center; margin-top: 18px; line-height: 1.7; }

  /* ===== 사용 현황 표 ===== */
  .tbl-wrap { margin-top: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  table.usage { width: 100%; border-collapse: collapse; font-size: 13px; }
  table.usage th, table.usage td { padding: 10px 8px; text-align: left; border-bottom: 1px solid var(--border); white-space: nowrap; }
  table.usage th { color: var(--muted); font-weight: 700; font-size: 12px; }
  table.usage td.code { font-family: ui-monospace, monospace; letter-spacing: 1px; color: var(--text); font-weight: 600; }
  table.usage tr.used td { color: var(--muted); }
  .pill { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px; font-weight: 700; }
  .pill.ok { background: var(--green-soft); color: var(--green); }
  .pill.no { background: var(--accent-soft); color: var(--accent-deep); }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .filter-row button { background: var(--surface); border: 1px solid var(--border); color: var(--muted); border-radius: 999px; padding: 7px 14px; font-size: 12px; font-weight: 700; cursor: pointer; }
  .filter-row button.on { background: var(--text); color: #fff; border-color: var(--text); }

  /* ===== 매장별 요약 ===== */
  .store-sum { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 2px; }
  .store-sum .s { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; }
  .store-sum .s .nm { font-weight: 700; color: var(--text); font-size: 14px; }
  .store-sum .s .ct { font-weight: 900; color: var(--accent-deep); font-size: 20px; }

  /* ===== 계정 관리 ===== */
  .acc-row { display: flex; justify-content: space-between; align-items: center; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .acc-row:last-child { border-bottom: none; }
  .acc-name { font-weight: 700; font-size: 14px; }
  .acc-pw { font-family: ui-monospace, monospace; font-size: 12px; color: var(--muted); margin-top: 3px; }
  .role-badge { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px; margin-left: 7px; }
  .role-badge.master { background: var(--accent-soft); color: var(--accent-deep); }
  .role-badge.store { background: var(--bg); color: var(--muted); border: 1px solid var(--border); }
  .acc-actions { display: flex; gap: 6px; }
  .acc-actions button { border: 1px solid var(--border); background: var(--surface); border-radius: 9px; padding: 7px 11px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; color: var(--text); }
  .acc-actions button.del { color: var(--red); border-color: #f3c2c2; }
  .acc-form { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 14px; }
  .acc-form input, .acc-form select { background: var(--bg); border: 1px solid var(--border); border-radius: 11px; padding: 12px; font-size: 14px; font-family: inherit; color: var(--text); }
  .acc-form input:focus, .acc-form select:focus { outline: none; border-color: var(--accent); background: var(--surface); }
  .acc-form .full { grid-column: 1 / 3; }
  .setup-notice { background: var(--accent-soft); border: 1px solid #f3d79a; color: #7a4f00; border-radius: 12px; padding: 12px 14px; font-size: 12px; line-height: 1.6; margin-bottom: 6px; }
  .setup-notice code { background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 4px; font-size: 11px; }

  /* ===== 모달 ===== */
  .modal { position: fixed; inset: 0; background: rgba(20,22,26,0.45); backdrop-filter: blur(2px); display: none; align-items: center; justify-content: center; padding: 24px; z-index: 50; }
  .modal.open { display: flex; }
  .modal-box { background: var(--surface); border-radius: 20px; padding: 26px 24px; width: 100%; max-width: 330px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.18); }
  .modal-box h3 { font-size: 19px; font-weight: 900; margin-bottom: 16px; color: var(--text); }
  .lang-toggle { display: flex; gap: 6px; justify-content: center; margin-bottom: 18px; }
  .lang-toggle button { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--muted); border-radius: 10px; padding: 10px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .lang-toggle button.on { background: var(--text); color: #fff; border-color: var(--text); }
  .modal-box input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); border-radius: 12px; padding: 14px; font-size: 18px; text-align: center; letter-spacing: 4px; margin-bottom: 10px; }
  .modal-box input:focus { outline: none; border-color: var(--accent); background: var(--surface); }
  .modal-box .err { color: var(--red); font-size: 13px; min-height: 18px; margin-bottom: 8px; }
  .hide { display: none !important; }

  /* ===== 인쇄: QR 카드만 출력 ===== */
  @media print {
    @page { margin: 12mm; }
    body { background: #fff; padding: 0; }
    header, .tabs, .stats, #scanView, #usageView, .note, #issueCard, #accountCard,
    #printCard > h2, #printCard .toolbar { display: none !important; }
    .card { border: none; padding: 0; margin: 0; background: #fff; }
    .voucher-list { grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .v { border: 1px solid #ddd; break-inside: avoid; padding: 14px 8px; opacity: 1 !important; }
    .v canvas, .v img { width: 110px !important; height: 110px !important; opacity: 1 !important; }
  }
</style>
</head>
<body>
<div class="wrap hide" id="mainWrap">
  <header>
    <button class="topbtn" id="topBtn">매장 로그인</button>
    <div class="logo">치맥페 <span class="em">2026</span></div>
    <div class="sub">VOUCHER SYSTEM</div>
    <div id="badge" class="mode-badge check">검증 모드</div>
    <div class="lang-mini">
      <button data-lang="ko" class="on">한국어</button>
      <button data-lang="vi">Tiếng Việt</button>
    </div>
  </header>

  <!-- 탭 -->
  <nav class="tabs hide" id="tabs">
    <button data-view="scan" class="on" data-i18n="tabScan">스캔</button>
    <button data-view="usage" data-i18n="tabUsage">현황</button>
    <button data-view="manage" class="hide" id="tabManage" data-i18n="tabManage">관리</button>
  </nav>

  <!-- ===== 스캔 ===== -->
  <section id="scanView">
    <div class="result" id="result"></div>
    <div class="card">
      <h2><span class="dot"></span><span data-i18n="scanTitle">QR 스캔으로 확인</span></h2>
      <div id="reader"></div>
      <button class="btn" id="scanBtn" data-i18n="scanStart">카메라 시작</button>
      <div class="manual">
        <input id="manualCode" placeholder="코드 직접 입력" data-i18n-ph="codePlaceholder" autocomplete="off" autocapitalize="characters" spellcheck="false">
        <button id="manualBtn" data-i18n="check">확인</button>
      </div>
    </div>
    <p class="note" data-i18n="scanNote">QR을 비추면 자동으로 확인되고, 중복 사용은 자동 차단됩니다.</p>
  </section>

  <!-- ===== 현황 ===== -->
  <section id="usageView" class="hide">
    <div class="stats">
      <div class="stat"><div class="n" id="stTotal">0</div><div class="l" data-i18n="issued">발급</div></div>
      <div class="stat"><div class="n" id="stUsed">0</div><div class="l" data-i18n="used">사용</div></div>
      <div class="stat left"><div class="n" id="stLeft">0</div><div class="l" data-i18n="left">잔여</div></div>
    </div>
    <div class="card">
      <h2><span class="dot"></span><span data-i18n="usageTitle">사용 현황</span></h2>
      <div class="store-sum" id="storeSum"></div>
      <div class="filter-row" id="filterRow" style="margin-top:14px">
        <button data-f="all" class="on" data-i18n="fAll">전체</button>
        <button data-f="used" data-i18n="fUsed">사용됨</button>
        <button data-f="unused" data-i18n="fUnused">미사용</button>
      </div>
      <div class="tbl-wrap">
        <table class="usage">
          <thead><tr><th data-i18n="thCode">코드</th><th data-i18n="thStatus">상태</th><th data-i18n="thStore">사용 매장</th><th data-i18n="thTime">시간</th></tr></thead>
          <tbody id="usageBody"></tbody>
        </table>
      </div>
      <div class="toolbar">
        <button class="btn ghost" id="csvBtn" data-i18n="csv">CSV 내보내기</button>
      </div>
    </div>
  </section>

  <!-- ===== 관리 (마스터 전용) ===== -->
  <section id="manageView" class="hide">
    <div class="card" id="issueCard">
      <h2><span class="dot"></span><span data-i18n="issueTitle">바우처 등록·발급</span></h2>
      <div class="gen-row">
        <input id="genCount" type="number" min="1" max="200" value="20">
        <label data-i18n="genLabel">장 자동 생성 (QR 발급)</label>
      </div>
      <button class="btn" id="genBtn" data-i18n="genBtn">QR 생성하기</button>
      <div class="manual">
        <input id="customCode" placeholder="직접 코드 추가 (선택)" data-i18n-ph="customPlaceholder" autocomplete="off" autocapitalize="characters" spellcheck="false">
        <button id="addBtn" data-i18n="add">추가</button>
      </div>
    </div>

    <div class="card" id="accountCard">
      <h2><span class="dot"></span><span data-i18n="accountsTitle">매장·관리자 계정</span></h2>
      <div class="setup-notice hide" id="accSetup" data-i18n="accSetup">계정 관리를 쓰려면 Supabase에 stores 테이블이 필요합니다. 지금은 기본 계정으로 동작 중입니다.</div>
      <div id="accList"></div>
      <div class="acc-form">
        <input id="accName" class="full" placeholder="매장명" data-i18n-ph="accName" autocomplete="off">
        <input id="accPw" placeholder="비밀번호(숫자)" data-i18n-ph="accPwPh" inputmode="numeric" autocomplete="off">
        <select id="accRole">
          <option value="store" data-i18n="roleStore">매장</option>
          <option value="master" data-i18n="roleMaster">마스터</option>
        </select>
        <button class="btn full" id="accSaveBtn" data-i18n="accSave">계정 추가 / 저장</button>
      </div>
    </div>

    <div class="card" id="printCard">
      <h2><span class="dot"></span><span data-i18n="printTitle">QR 카드 (인쇄·배포용)</span></h2>
      <div class="voucher-list" id="vList"><div class="empty" style="grid-column:1/3" data-i18n="noVoucher">아직 발급된 바우처가 없습니다</div></div>
      <div class="toolbar">
        <button class="btn ghost" id="printBtn" data-i18n="print">QR 인쇄</button>
      </div>
    </div>
    <p class="note" id="adminNote" data-i18n="adminNote">발급한 바우처는 모든 매장 기기에서 실시간으로 공유됩니다.</p>
  </section>
</div>

<div class="modal open" id="loginModal">
  <div class="modal-box">
    <div class="lang-toggle">
      <button data-lang="ko" class="on">한국어</button>
      <button data-lang="vi">Tiếng Việt</button>
    </div>
    <h3 data-i18n="loginTitle">치맥페 바우처 로그인</h3>
    <input id="pwInput" type="password" inputmode="numeric" placeholder="비밀번호" data-i18n-ph="pwPlaceholder" autocomplete="off">
    <div class="err" id="pwErr"></div>
    <button class="btn" id="loginBtn" data-i18n="enter">입장</button>
    <button class="btn ghost hide" id="cancelBtn" style="margin-top:8px" data-i18n="cancel">취소</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

// 기본 계정 (Supabase stores 테이블이 없을 때 사용)
const DEFAULT_ACCOUNTS = {
  '0600': { name:'마스터 관리자', role:'master' },
  '0601': { name:'한타운',       role:'store'  },
  '0602': { name:'치키치킨',     role:'store'  },
  '0603': { name:'치바고',       role:'store'  },
  '0604': { name:'호랑이치킨',   role:'store'  },
  '0605': { name:'루비에치킨',   role:'store'  }
};
let accounts = { ...DEFAULT_ACCOUNTS };
let storesTableOk = false;
let editingPw = null;
let vouchers = {};
let scanner = null, scanning = false, lastScan = 0, cameraEnabled = false;
let isAdmin = false, isMaster = false;
let currentStore = null;
let view = 'scan';
let resultTimer = null;

// ===== 데이터 =====
async function load() {
  try {
    const { data, error } = await sb.from('vouchers').select('*');
    if (error) throw error;
    vouchers = {};
    (data || []).forEach(row => { vouchers[row.code] = { used: row.used, usedAt: row.used_at, store: row.store }; });
  } catch(e) { console.error('불러오기 실패', e); }
  render();
}
async function saveNew(codes) {
  const rows = codes.map(c => ({ code: c, used: false, used_at: null, store: null }));
  try {
    const { error } = await sb.from('vouchers').insert(rows);
    if (error) throw error;
  } catch(e) { console.error('발급 저장 실패', e); alert('발급 저장에 실패했습니다. 연결을 확인하세요.'); }
}
function subscribeRealtime() {
  sb.channel('vouchers-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'vouchers' }, payload => {
      const row = payload.new;
      if (row && row.code) { vouchers[row.code] = { used: row.used, usedAt: row.used_at, store: row.store }; render(); }
    })
    .subscribe();
}

// ===== 계정(매장·관리자) =====
async function loadStores() {
  try {
    const { data, error } = await sb.from('stores').select('*');
    if (error) throw error;
    storesTableOk = true;
    if (data && data.length) {
      accounts = {};
      data.forEach(r => { accounts[r.pw] = { name: r.name, role: r.role || 'store' }; });
    } else {
      // 테이블이 비어 있으면 기본 계정으로 1회 시드
      accounts = { ...DEFAULT_ACCOUNTS };
      try { await sb.from('stores').insert(Object.entries(DEFAULT_ACCOUNTS).map(([pw,v]) => ({ pw, name:v.name, role:v.role }))); } catch(e){}
    }
  } catch(e) {
    storesTableOk = false;
    accounts = { ...DEFAULT_ACCOUNTS };
    console.warn('stores 테이블 사용 불가 — 기본 계정으로 동작', e);
  }
  if (isMaster) renderAccounts();
  if (isAdmin) renderStoreSum();
}
function subscribeStores() {
  sb.channel('stores-changes')
    .on('postgres_changes', { event:'*', schema:'public', table:'stores' }, () => { loadStores(); })
    .subscribe();
}
function renderAccounts() {
  const box = document.getElementById('accList');
  if (!box) return;
  box.innerHTML = Object.keys(accounts).sort((a,b)=>a.localeCompare(b)).map(pw => {
    const a = accounts[pw];
    const rb = a.role === 'master'
      ? `<span class="role-badge master">${t('roleMaster')}</span>`
      : `<span class="role-badge store">${t('roleStore')}</span>`;
    return `<div class="acc-row">
      <div><span class="acc-name">${a.name}</span>${rb}<div class="acc-pw">PW · ${pw}</div></div>
      <div class="acc-actions">
        <button onclick="editAccount('${pw}')">${t('accEdit')}</button>
        <button class="del" onclick="deleteAccount('${pw}')">${t('accDelete')}</button>
      </div></div>`;
  }).join('');
  const notice = document.getElementById('accSetup');
  if (notice) notice.classList.toggle('hide', storesTableOk);
}
async function saveAccount() {
  const name = accName.value.trim();
  const pw = accPw.value.trim();
  const role = accRole.value;
  if (!name || !pw) { alert(t('accNeedFields')); return; }
  if (pw !== editingPw && accounts[pw]) { alert(t('accDupPw')); return; }
  accounts[pw] = { name, role };
  if (storesTableOk) { try { await sb.from('stores').upsert({ pw, name, role }); } catch(e){ console.error(e); } }
  editingPw = null; accName.value = ''; accPw.value = ''; accRole.value = 'store';
  renderAccounts(); renderStoreSum();
}
function editAccount(pw) {
  if (!accounts[pw]) return;
  editingPw = pw;
  accName.value = accounts[pw].name; accPw.value = pw; accRole.value = accounts[pw].role;
  accName.focus();
}
async function deleteAccount(pw) {
  const masters = Object.values(accounts).filter(a => a.role === 'master');
  if (accounts[pw] && accounts[pw].role === 'master' && masters.length <= 1) { alert(t('accLastMaster')); return; }
  if (!confirm(t('accDelConfirm'))) return;
  delete accounts[pw];
  if (storesTableOk) { try { await sb.from('stores').delete().eq('pw', pw); } catch(e){ console.error(e); } }
  if (editingPw === pw) { editingPw = null; accName.value=''; accPw.value=''; accRole.value='store'; }
  renderAccounts(); renderStoreSum();
}

// ===== 렌더 =====
function render() {
  const codes = Object.keys(vouchers);
  const used = codes.filter(c => vouchers[c].used).length;
  stTotal.textContent = codes.length;
  stUsed.textContent = used;
  stLeft.textContent = codes.length - used;
  if (isAdmin) { renderList(); renderUsage(); renderStoreSum(); if (isMaster) renderAccounts(); }
}

let usageFilter = 'all';
function fmtTime(ts) {
  const d = new Date(ts);
  const M = d.getMonth()+1, D = d.getDate();
  const hh = String(d.getHours()).padStart(2,'0'), mm = String(d.getMinutes()).padStart(2,'0');
  return `${M}/${D} ${hh}:${mm}`;
}
function renderUsage() {
  const body = document.getElementById('usageBody');
  let codes = Object.keys(vouchers).sort();
  if (usageFilter === 'used') codes = codes.filter(c => vouchers[c].used);
  if (usageFilter === 'unused') codes = codes.filter(c => !vouchers[c].used);
  if (!codes.length) { body.innerHTML = `<tr><td colspan="4" class="empty" style="padding:18px">${t('noRows')}</td></tr>`; return; }
  codes.sort((a,b) => {
    const ua = vouchers[a].used, ub = vouchers[b].used;
    if (ua && ub) return vouchers[b].usedAt - vouchers[a].usedAt;
    if (ua) return -1; if (ub) return 1; return a < b ? -1 : 1;
  });
  body.innerHTML = codes.map(c => {
    const v = vouchers[c];
    if (v.used) {
      return `<tr class="used"><td class="code">${c.replace(PREFIX,'')}</td>
        <td><span class="pill ok">${t('pillUsed')}</span></td>
        <td>${v.store || t('noRecord')}</td><td>${fmtTime(v.usedAt)}</td></tr>`;
    }
    return `<tr><td class="code">${c.replace(PREFIX,'')}</td>
      <td><span class="pill no">${t('pillUnused')}</span></td><td>—</td><td>—</td></tr>`;
  }).join('');
}
function renderStoreSum() {
  const sum = {};
  Object.values(accounts).forEach(a => { if (a.role !== 'master') sum[a.name] = 0; });
  Object.values(vouchers).forEach(v => { if (v.used && v.store && v.store in sum) sum[v.store]++; });
  const keys = Object.keys(sum);
  document.getElementById('storeSum').innerHTML = keys.length
    ? keys.map(s => `<div class="s"><span class="nm">${s}</span><span class="ct">${sum[s]}</span></div>`).join('')
    : '';
}
function renderList() {
  const codes = Object.keys(vouchers);
  const list = document.getElementById('vList');
  if (!codes.length) { list.innerHTML = `<div class="empty" style="grid-column:1/3">${t('noVoucher')}</div>`; return; }
  list.innerHTML = '';
  codes.forEach(c => {
    const d = document.createElement('div');
    d.className = 'v' + (vouchers[c].used ? ' used' : '');
    const q = document.createElement('div'); d.appendChild(q);
    const lbl = document.createElement('div'); lbl.className = 'vc'; lbl.textContent = c.replace(PREFIX,'');
    d.appendChild(lbl);
    if (vouchers[c].used) {
      const ub = document.createElement('div'); ub.className = 'badge-used'; ub.textContent = t('usedStamp'); d.appendChild(ub);
      const info = document.createElement('div'); info.className = 'vinfo';
      const dt = new Date(vouchers[c].usedAt);
      const hh = String(dt.getHours()).padStart(2,'0'), mm = String(dt.getMinutes()).padStart(2,'0');
      info.innerHTML = `${vouchers[c].store || t('noRecord')}<br>${hh}:${mm}`;
      d.appendChild(info);
    }
    list.appendChild(d);
    new QRCode(q, { text: c, width: 84, height: 84, correctLevel: QRCode.CorrectLevel.M });
  });
}

// ===== 결과 =====
function showResult(type, code) {
  const r = document.getElementById('result');
  clearTimeout(resultTimer);
  r.className = 'result ' + (type === 'nostore' ? 'bad' : type);
  if (type === 'ok') {
    r.innerHTML = `<div class="ico">🍺</div><div class="ttl">${t('resOk')}</div><div class="meta">${currentStore} ${t('resOkMeta')}</div><div class="code">${code}</div>`;
    resultTimer = setTimeout(() => { r.className = 'result'; }, 6000); // 성공은 잠시 후 자동으로 비움
  } else if (type === 'dup') {
    const tm = new Date(vouchers[code].usedAt);
    const hh = String(tm.getHours()).padStart(2,'0'), mm = String(tm.getMinutes()).padStart(2,'0');
    const store = vouchers[code].store || t('noRecord');
    r.innerHTML = `<div class="ico">🚫</div><div class="ttl">${t('resDup')}</div><div class="meta">${t('resDupMeta')(store, hh+':'+mm)}</div><div class="code">${code}</div>`;
  } else if (type === 'nostore') {
    r.innerHTML = `<div class="ico">🔑</div><div class="ttl">${t('resNoStore')}</div><div class="meta">${t('resNoStoreMeta')}</div>`;
  } else {
    r.innerHTML = `<div class="ico">❓</div><div class="ttl">${t('resBad')}</div><div class="meta">${t('resBadMeta')}</div><div class="code">${code}</div>`;
  }
}

async function redeem(code) {
  code = (code||'').trim().toUpperCase();
  if (!code) return;
  if (!currentStore) { showResult('nostore', code); beep(false); return; }
  if (!(code in vouchers) && !code.startsWith(PREFIX) && (PREFIX + code) in vouchers) code = PREFIX + code;
  let row = null;
  try { const { data } = await sb.from('vouchers').select('*').eq('code', code).maybeSingle(); row = data; }
  catch(e) { console.error(e); }
  if (!row) { showResult('bad', code); beep(false); return; }
  vouchers[code] = { used: row.used, usedAt: row.used_at, store: row.store };
  if (row.used) { showResult('dup', code); beep(false); render(); return; }
  const usedAt = Date.now();
  const { data: updated, error } = await sb.from('vouchers')
    .update({ used: true, used_at: usedAt, store: currentStore })
    .eq('code', code).eq('used', false).select();
  if (error || !updated || updated.length === 0) {
    try { const { data } = await sb.from('vouchers').select('*').eq('code', code).maybeSingle();
      if (data) vouchers[code] = { used: data.used, usedAt: data.used_at, store: data.store }; } catch(e){}
    showResult('dup', code); beep(false); render(); return;
  }
  vouchers[code] = { used: true, usedAt: usedAt, store: currentStore };
  render(); showResult('ok', code); beep(true);
}

function beep(ok) {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = ok ? 880 : 220;
    g.gain.setValueAtTime(0.2, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
    o.start(); o.stop(ctx.currentTime + 0.25);
  } catch(e){}
}

// ===== 카메라 =====
function updateScanBtn() {
  scanBtn.textContent = scanning ? t('scanStop') : t('scanStart');
  scanBtn.classList.toggle('ghost', scanning);
}
async function startScan() {
  if (scanning) return;
  if (!scanner) scanner = new Html5Qrcode('reader');
  try {
    await scanner.start({ facingMode: 'environment' }, { fps: 10, qrbox: 220 },
      (txt) => { const now = Date.now(); if (now - lastScan < 1500) return; lastScan = now; redeem(txt); }, () => {});
    scanning = true; cameraEnabled = true; updateScanBtn();
  } catch(e) { alert(t('alCam')); }
}
async function stopScan() {
  if (!scanning) return;
  try { await scanner.stop(); } catch(e){}
  scanning = false; updateScanBtn();
}

// ===== 화면 전환 =====
function showView(v) {
  view = v;
  document.querySelectorAll('#tabs button').forEach(b => b.classList.toggle('on', b.dataset.view === v));
  document.getElementById('scanView').classList.toggle('hide', v !== 'scan');
  document.getElementById('usageView').classList.toggle('hide', v !== 'usage');
  document.getElementById('manageView').classList.toggle('hide', v !== 'manage');
  if (v === 'scan') { if (cameraEnabled && !scanning) startScan(); }
  else if (scanning) { stopScan(); }
  if (v === 'usage' || v === 'manage') render();
}

function setMode(loggedIn) {
  isAdmin = loggedIn;
  document.getElementById('tabs').classList.toggle('hide', !loggedIn);
  document.getElementById('tabManage').classList.toggle('hide', !(loggedIn && isMaster));
  const badge = document.getElementById('badge');
  if (loggedIn) {
    badge.className = 'mode-badge admin';
    const tag = isMaster ? t('badgeMaster') : t('badgeStore');
    badge.textContent = currentStore + (tag ? ' · ' + tag : '');
    document.getElementById('topBtn').textContent = t('logout');
  } else {
    badge.className = 'mode-badge check';
    badge.textContent = t('badgeCheck');
    document.getElementById('topBtn').textContent = t('storeLogin');
  }
  render();
}

// ===== 이벤트 =====
document.getElementById('topBtn').onclick = () => {
  if (isAdmin) {
    stopScan();
    currentStore = null; isMaster = false; cameraEnabled = false; setMode(false);
    document.getElementById('mainWrap').classList.add('hide');
    document.getElementById('loginModal').classList.add('open');
    document.getElementById('pwInput').focus();
    return;
  }
  document.getElementById('loginModal').classList.add('open');
  document.getElementById('pwInput').focus();
};
document.getElementById('cancelBtn').onclick = () => {
  document.getElementById('loginModal').classList.remove('open');
  document.getElementById('pwErr').textContent = ''; document.getElementById('pwInput').value = '';
};
document.getElementById('loginBtn').onclick = () => {
  const pw = pwInput.value.trim();
  const acc = accounts[pw];
  if (acc) {
    currentStore = acc.name; isMaster = (acc.role === 'master');
    document.getElementById('loginModal').classList.remove('open');
    document.getElementById('mainWrap').classList.remove('hide');
    pwErr.textContent=''; pwInput.value='';
    setMode(true); showView('scan');
  } else { pwErr.textContent = t('pwWrong'); }
};
document.getElementById('pwInput').addEventListener('keydown', e => { if (e.key==='Enter') loginBtn.click(); });

document.getElementById('manualBtn').onclick = () => { redeem(manualCode.value); manualCode.value = ''; };
document.getElementById('manualCode').addEventListener('keydown', e => { if (e.key==='Enter') manualBtn.click(); });
document.getElementById('scanBtn').onclick = () => { scanning ? stopScan() : startScan(); };

document.querySelectorAll('#tabs button').forEach(btn => { btn.onclick = () => showView(btn.dataset.view); });

document.getElementById('genBtn').onclick = async () => {
  if (!isMaster) { alert(t('alGen')); return; }
  const n = Math.min(200, Math.max(1, parseInt(genCount.value)||1));
  const newCodes = [];
  for (let i=0;i<n;i++) {
    let code;
    do { code = PREFIX + Math.random().toString(36).slice(2,7).toUpperCase(); }
    while (code in vouchers || newCodes.includes(code));
    newCodes.push(code);
  }
  await saveNew(newCodes);
  newCodes.forEach(c => { vouchers[c] = { used:false, usedAt:null, store:null }; });
  render();
};
document.getElementById('addBtn').onclick = async () => {
  if (!isMaster) { alert(t('alAdd')); return; }
  let code = (customCode.value||'').trim().toUpperCase();
  if (!code) return;
  if (!code.startsWith(PREFIX)) code = PREFIX + code;
  if (code in vouchers) { alert(t('alExist')); return; }
  await saveNew([code]);
  vouchers[code] = { used:false, usedAt:null, store:null };
  customCode.value=''; render();
};
document.getElementById('printBtn').onclick = () => window.print();

document.getElementById('accSaveBtn').onclick = saveAccount;
document.getElementById('accPw').addEventListener('keydown', e => { if (e.key==='Enter') saveAccount(); });

document.querySelectorAll('#filterRow button').forEach(btn => {
  btn.onclick = () => {
    usageFilter = btn.dataset.f;
    document.querySelectorAll('#filterRow button').forEach(b => b.classList.toggle('on', b === btn));
    renderUsage();
  };
});

document.getElementById('csvBtn').onclick = () => {
  const rows = [['코드','상태','사용매장','사용시간']];
  Object.keys(vouchers).sort().forEach(c => {
    const v = vouchers[c];
    rows.push([c, v.used ? '사용' : '미사용', v.used ? (v.store||'미기록') : '', v.used ? fmtTime(v.usedAt) : '']);
  });
  const csv = '﻿' + rows.map(r => r.map(x => `"${String(x).replace(/"/g,'""')}"`).join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = 'chimac_voucher_' + Date.now() + '.csv';
  a.click(); URL.revokeObjectURL(url);
};

function applyLang() {
  document.body.classList.toggle('lang-vi', lang === 'vi');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if (I18N[lang][k] !== undefined) el.textContent = I18N[lang][k];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const k = el.getAttribute('data-i18n-ph');
    if (I18N[lang][k] !== undefined) el.placeholder = I18N[lang][k];
  });
  document.querySelectorAll('[data-lang]').forEach(b => b.classList.toggle('on', b.dataset.lang === lang));
  setMode(isAdmin);
  updateScanBtn();
}
document.querySelectorAll('[data-lang]').forEach(btn => { btn.onclick = () => { lang = btn.dataset.lang; applyLang(); }; });

setMode(false);
applyLang();
load();
loadStores();
subscribeRealtime();
subscribeStores();
document.getElementById('pwInput').focus();
</script>
</body>
</html>
